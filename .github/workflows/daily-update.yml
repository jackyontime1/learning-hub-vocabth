name: Update Learning Hub Daily Reader

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC only. These two UTC hours cover 05:00 in
    # America/Toronto across DST; the should-run job below keeps one real run.
    - cron: "0 9,10 * * *"

permissions:
  contents: write

concurrency:
  group: learning-hub-cloudflare-pages
  cancel-in-progress: false

jobs:
  should-run:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.toronto.outputs.run }}
    steps:
      - id: toronto
        name: Confirm 05:00 America/Toronto
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$(TZ=America/Toronto date +%H)" = "05" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daily-english-reader
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: daily-english-reader/requirements.txt

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install free local services
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng ffmpeg libsndfile1
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install libretranslate

      - name: Start LibreTranslate
        run: |
          libretranslate --load-only en,th --disable-web-ui >/tmp/libretranslate.log 2>&1 &
          for attempt in $(seq 1 60); do
            curl --fail --silent http://127.0.0.1:5000/health >/dev/null && exit 0
            sleep 5
          done
          cat /tmp/libretranslate.log
          exit 1

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Preflight no-audio build
        env:
          FREE_ONLY: "1"
          LIBRETRANSLATE_URL: http://127.0.0.1:5000
          RETENTION_DAYS: "1"
          DEMO_MODE: "1"
          SKIP_AUDIO: "1"
        run: python update_site.py

      - name: Build daily reader
        env:
          FREE_ONLY: "1"
          CURRENTS_API_KEY: ${{ secrets.CURRENTS_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          LIBRETRANSLATE_URL: http://127.0.0.1:5000
          RETENTION_DAYS: "30"
          DEMO_MODE: "0"
          SKIP_AUDIO: "0"
        run: python update_site.py

      - name: Persist rolling cache
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-english-reader/data daily-english-reader/static/images
          if ! git diff --cached --quiet; then
            git commit -m "chore: update free daily reader content"
            git push
          fi

      - name: Check Podcast source
        run: test -d ../deploy-rollback-original || (echo "Missing ../deploy-rollback-original; required for Podcast and Flashcards in the combined Learning Hub" && exit 1)

      - name: Build combined Learning Hub
        run: node scripts/build-learning-hub.mjs

      - name: Check Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN secret" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID secret" && exit 1)

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest pages deploy site --project-name learning-hub-vocabth --branch main
